# ============================================================================
# Pipeline COMPLETO de pruebas (Fase 5): TimescaleDB + servidor OPC-UA simulado
# + conector. Autocontenido (no usa .env). SOLO para pruebas locales.
#
#   docker compose -f docker-compose.test.yml up --build
#
# Observabilidad del conector:  http://localhost:8000/health  y  /metrics
# ============================================================================

services:
  # ── Base de datos efímera (en producción la BD es un servidor remoto) ──────
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: scada_db
      POSTGRES_USER: connector_user
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connector_user -d scada_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test_network

  # ── Servidor OPC-UA simulado (reutiliza la imagen del conector) ────────────
  opcua-sim:
    build:
      context: .
      dockerfile: Dockerfile
    image: opcua-connector:test
    hostname: opcua-sim
    environment:
      # Sin buffering para ver en tiempo real los "writes/s reales" del simulador.
      PYTHONUNBUFFERED: "1"
    # Anunciar el endpoint con el nombre de servicio evita que el cliente reciba
    # un endpoint 0.0.0.0 inservible en la red de Docker.
    command: >
      python tools/opcua_sim_server.py
      --endpoint opc.tcp://opcua-sim:4840/freeopcua/server/
      --tags 5000
      --changes-per-sec 10000
    volumes:
      - ./tools:/app/tools:ro
    ports:
      - "4840:4840"
    # El HEALTHCHECK del Dockerfile apunta al endpoint :8000 del conector, que el
    # simulador no expone. Se desactiva para no marcar el servicio como unhealthy.
    healthcheck:
      disable: true
    networks:
      - test_network

  # ── Conector bajo prueba ───────────────────────────────────────────────────
  connector:
    build:
      context: .
      dockerfile: Dockerfile
    image: opcua-connector:test
    depends_on:
      timescaledb:
        condition: service_healthy
      opcua-sim:
        condition: service_started
    environment:
      # OPC-UA: sin seguridad contra el simulador
      OPC_SERVER_URL: opc.tcp://opcua-sim:4840/freeopcua/server/
      OPC_SECURITY_MODE: "None"
      OPC_NAMESPACE_INDEX: "2"        # ns del simulador (SimTags)
      OPC_PUBLISH_INTERVAL_MS: "100"  # entrega más frecuente para acercarse a 10k val/s
      OPC_TAG_OFFSET: "0"
      OPC_TAG_LIMIT: "5000"
      # Base de datos local de pruebas
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      POSTGRES_DB: scada_db
      POSTGRES_USER: connector_user
      POSTGRES_PASSWORD: test
      POSTGRES_SSL_MODE: disable
      POSTGRES_USE_TIMESCALE: "true"
      # Operación
      CONNECTOR_ID: connector-test
      LOG_FORMAT: pretty
      METRICS_PORT: "8000"
      OPC_QUEUE_MAX_SIZE: "500000"
    volumes:
      - connector_spill:/var/lib/connector/spill
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - test_network

volumes:
  connector_spill:

networks:
  test_network:
    driver: bridge
